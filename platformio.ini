; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
    name = InternetRadio

[env]
    platform = espressif32
    board = esp32-s3-devkitc-1
    framework = arduino
    board_build.partitions = huge_app.csv
    board_build.mcu = esp32s3
    board_build.f_cpu = 240000000L
    board_build.arduino.memory_type = qio_opi
    board_upload.flash_size = 4MB
    monitor_speed = 115200

    lib_deps =     
        moononournation/GFX Library for Arduino @ ^1.5.6
        lvgl/lvgl@^9.4.0
        tamctec/TAMC_GT911 @ ^1.0.2
        bblanchon/ArduinoJson @ 7.3.1
        esphome/ESP32-audioI2S @ ^2.3.0
        fbiego/ESP32Time @ ^2.0.6
        ;yellobyte/SoapESP32 @ ^1.4.1

[env:JC4827W543]
    monitor_speed = 115200
    monitor_rts = 0
    monitor_dtr = 0
    
    build_flags = 
        -D HOSTNAME="\"DEV_INTERNET_RADIO\""
        -D DEBUG_MODE
        -D BOARD_HAS_PSRAM
        -mfix-esp32-psram-cache-issue
        -I lib
        ; Needed for USB to enumerate when user code starts
        ; wylaczyc jak nie bedzie juz potrzebny serial - powoduje problemy ze startem
        -D ARDUINO_USB_MODE=1 ; CDC/JTAG USB mode
        -D ARDUINO_USB_CDC_ON_BOOT=1


[env:JC4827W543_OTA]
    upload_protocol = espota
    ;upload_port = 192.168.99.54
    upload_flags = 
        --auth=
    build_flags = 
        -D HOSTNAME="\"DEV_INTERNET_RADIO\""
        -D BOARD_HAS_PSRAM
        -mfix-esp32-psram-cache-issue
        -I lib

